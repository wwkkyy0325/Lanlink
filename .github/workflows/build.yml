name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        run: wails build -platform windows/amd64 -nsis

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-windows
          path: build/bin/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (Universal)
        run: wails build -platform darwin/universal

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-macos
          path: build/bin/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libpkgconf3

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-linux
          path: build/bin/*

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-macos
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-linux
          path: artifacts/linux

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r lanlink-windows.zip windows/
          zip -r lanlink-macos.zip macos/
          zip -r lanlink-linux.zip linux/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/lanlink-windows.zip
            artifacts/lanlink-macos.zip
            artifacts/lanlink-linux.zip
          generate_release_notes: true
