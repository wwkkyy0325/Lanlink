name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        run: wails build -platform windows/amd64 -nsis -o lanlink.exe

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-windows-amd64
          path: build/bin/lanlink.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (Universal)
        run: |
          wails build -platform darwin/universal -o lanlink
          cd build/bin
          tar -czf ../../../lanlink-darwin-universal.tar.gz lanlink.app

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-darwin-universal
          path: lanlink-darwin-universal.tar.gz

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64 -o lanlink

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-linux-amd64
          path: build/bin/lanlink

  # ── Bare TCP relay — cross-compile for all platforms ──────
  build-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build relay (all platforms)
        run: |
          GOOS=linux   GOARCH=amd64 go build -o relay-linux-amd64   ./cmd/relay
          GOOS=linux   GOARCH=arm64 go build -o relay-linux-arm64   ./cmd/relay
          GOOS=windows GOARCH=amd64 go build -o relay-windows-amd64.exe ./cmd/relay
          GOOS=darwin  GOARCH=amd64 go build -o relay-darwin-amd64  ./cmd/relay
          GOOS=darwin  GOARCH=arm64 go build -o relay-darwin-arm64  ./cmd/relay

      - uses: actions/upload-artifact@v4
        with:
          name: relay-all-platforms
          path: relay-*

  # ── Release — attach everything to the tag ────────────────
  release:
    needs: [build-windows, build-macos, build-linux, build-relay]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-windows-amd64
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-darwin-universal
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: lanlink-linux-amd64
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: relay-all-platforms
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
