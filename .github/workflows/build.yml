name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        run: wails build -platform windows/amd64 -nsis -o lanlink.exe

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-windows-amd64
          path: build/bin/lanlink.exe

  # ── macOS ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (Universal)
        env:
          CGO_ENABLED: 1
        run: wails build -platform darwin/universal -o lanlink

      - name: Package
        run: |
          APP=$(ls -d build/bin/*.app | head -1)
          tar -czf lanlink-darwin-universal.tar.gz -C build/bin "$(basename "$APP")"

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-darwin-universal
          path: lanlink-darwin-universal.tar.gz

  # ── Linux ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64 -o lanlink

      - uses: actions/upload-artifact@v4
        with:
          name: lanlink-linux-amd64
          path: build/bin/lanlink

  # ── Bare TCP relay — cross-compile for all platforms ──────
  build-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Build relay (all platforms)
        run: |
          GOOS=linux   GOARCH=amd64 go build -o relay-linux-amd64   ./cmd/relay
          GOOS=linux   GOARCH=arm64 go build -o relay-linux-arm64   ./cmd/relay
          GOOS=windows GOARCH=amd64 go build -o relay-windows-amd64.exe ./cmd/relay
          GOOS=darwin  GOARCH=amd64 go build -o relay-darwin-amd64  ./cmd/relay
          GOOS=darwin  GOARCH=arm64 go build -o relay-darwin-arm64  ./cmd/relay

      - uses: actions/upload-artifact@v4
        with:
          name: relay-all-platforms
          path: relay-*

  # ── Release — create GitHub Release and attach all artifacts ─
  release:
    needs: [build-windows, build-macos, build-linux, build-relay]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Download each artifact independently; skip if that platform failed.
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lanlink-windows-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lanlink-darwin-universal
          path: artifacts

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lanlink-linux-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: relay-all-platforms
          path: artifacts

      - name: Show artifacts
        run: ls -laR artifacts/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v0.1.0
          body: |
            ## Lanlink v0.1.0

            LAN file transfer & chat desktop app — discover devices on your local network, send files and messages instantly.

            ### Features

            **LAN Mode**
            - Zero-config device discovery via UDP broadcast
            - File transfer with accept/decline handshake + HTTP Range resume
            - Direct text chat + AES-256 encrypted group chat

            **P2P Internet Mode**
            - libp2p with AutoNAT, DCUtR hole punching, circuit relay v2, UPnP
            - DoH relay domain resolution (bypass GFW DNS pollution)
            - Custom relay nodes with bare TCP support (no TLS/SNI)
            - Transport mode selector: Auto / LAN-only

            **Bare TCP Relay Server** (`cmd/relay/`)
            - Standalone circuit relay v2 binary on raw TCP
            - No WebSocket, no TLS, no SNI fingerprint
            - Deploy on any VPS with a public IP

            ### Downloads

            | Platform | File |
            |---|---|
            | Windows (x64) | `lanlink.exe` |
            | macOS (Intel + Apple Silicon) | `lanlink-darwin-universal.tar.gz` |
            | Linux (x64) | `lanlink` |
            | Relay — Linux (x64, arm64) | `relay-linux-*` |
            | Relay — Windows (x64) | `relay-windows-amd64.exe` |
            | Relay — macOS (x64, arm64) | `relay-darwin-*` |

            ### Build from source
            ```bash
            git clone https://github.com/wwkkyy0325/Lanlink.git
            cd Lanlink
            wails build
            ```

            ### Run the relay
            ```bash
            go build -o relay ./cmd/relay
            ./relay -port 4001
            ```
          files: artifacts/*
          fail_on_unmatched_files: false
          generate_release_notes: false
