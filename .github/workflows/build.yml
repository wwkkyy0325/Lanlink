name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        run: wails build -platform windows/amd64 -nsis -o lanlink.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lanlink-windows-amd64
          path: build/bin/lanlink.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload ${{ github.ref_name }} build/bin/lanlink.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (Universal)
        env:
          CGO_ENABLED: 1
        run: wails build -platform darwin/universal -o lanlink

      - name: Debug build output
        run: ls -laR build/bin/

      - name: Package
        run: |
          APP=$(ls -d build/bin/*.app | head -1)
          echo "Found app: $APP"
          tar -czf lanlink-darwin-universal.tar.gz -C build/bin "$(basename "$APP")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lanlink-darwin-universal
          path: lanlink-darwin-universal.tar.gz

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload ${{ github.ref_name }} lanlink-darwin-universal.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64 -o lanlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lanlink-linux-amd64
          path: build/bin/lanlink

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload ${{ github.ref_name }} build/bin/lanlink --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Bare TCP relay — cross-compile for all platforms ──────
  build-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Build relay (all platforms)
        run: |
          GOOS=linux   GOARCH=amd64 go build -o relay-linux-amd64   ./cmd/relay
          GOOS=linux   GOARCH=arm64 go build -o relay-linux-arm64   ./cmd/relay
          GOOS=windows GOARCH=amd64 go build -o relay-windows-amd64.exe ./cmd/relay
          GOOS=darwin  GOARCH=amd64 go build -o relay-darwin-amd64  ./cmd/relay
          GOOS=darwin  GOARCH=arm64 go build -o relay-darwin-arm64  ./cmd/relay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-all-platforms
          path: relay-*

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload ${{ github.ref_name }} \
            relay-linux-amd64 relay-linux-arm64 \
            relay-windows-amd64.exe \
            relay-darwin-amd64 relay-darwin-arm64 \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
